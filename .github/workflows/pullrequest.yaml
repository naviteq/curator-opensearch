---

name: Pull request code validation and building (Main branch)
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
        with:
          python-version: '3.9'
      - name: Python format
        uses: psf/black@stable
        with:
          version: 23.1.0

  unit-test:
    name: Run unit tests
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch
        ports:
          - 9200:9200
          - 9600:9600
        env:
          discovery.type: single-node
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
        with:
          python-version: '3.9'
      - uses: syphar/restore-virtualenv@v1
        id: cache-virtualenv
      - uses: syphar/restore-pip-download-cache@v1
      - run: pip install -r requirements-dev.txt
      - name: Tests run
        uses: nick-fields/retry@v2
        with:
          timeout_seconds: 15
          max_attempts: 3
          command: python test/run_tests.py unit

  version:
    name: Update version 
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/update-version
        with:
          version: pr


  docker:
    uses: naviteq/github-actions/.github/workflows/docker-build.yaml@nr-71/docker-build-rework
    # needs: [version, format, unit-test]  # temporarily reduced for NR-71 testing
    needs: [version]
    with:
      REGISTRY: ghcr.io
      IMAGE: ${{ github.repository }}
      USERNAME: ${{ github.actor }}
      RUNNER: ubuntu-latest
      DOCKERFILE: ./Dockerfile
      DOCKER_PLATFORMS: linux/amd64,linux/amd64/v2
      TAG_FLAVOR_SUFFIX: 'suffix'
      TAG_FLAVOR_PREFIX: 'prefix'
      DOCKER_PUSH: true
      SLACK_NOTIFY_ON_SUCCESS: true
      SECURITY_SCAN_ENABLED: true
      SECURITY_SCAN_EXIT_CODE: 1
      SECURITY_SCAN_FAIL_ON_SEVERITY: "LOW"
      SBOM_ENABLED: true
      CUSTOM_TAGS: |
        customtag1
        customtag2
        customtagtest
      BUILD_ARGS: |
        TESTARG1=true
        TESTARG2=true2
    secrets:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.TEST_SLACK_WEBHOOK }}
      BUILD_SECRETS: |
        smoke_secret=plain-text-value
        smoke_secret2=plain-text-value2

